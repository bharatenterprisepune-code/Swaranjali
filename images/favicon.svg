<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <circle cx="16" cy="16" r="16" fill="#F5A623"/>
  <!-- Car body -->
  <rect x="6" y="15" width="20" height="8" rx="2.5" fill="#0A1628"/>
  <!-- Car cabin -->
  <path d="M10 15 L12 10 L20 10 L22 15 Z" fill="#0A1628"/>
  <!-- Windshield hint -->
  <line x1="16" y1="10.5" x2="16" y2="14.5" stroke="#F5A623" stroke-width="0.8" opacity="0.6"/>
  <!-- Front wheel -->
  <circle cx="23" cy="23.5" r="3" fill="#0A1628" stroke="#F5A623" stroke-width="1"/>
  <circle cx="23" cy="23.5" r="1.2" fill="#F5A623"/>
  <!-- Rear wheel -->
  <circle cx="9" cy="23.5" r="3" fill="#0A1628" stroke="#F5A623" stroke-width="1"/>
  <circle cx="9" cy="23.5" r="1.2" fill="#F5A623"/>
  <!-- Headlight -->
  <rect x="25" y="17" width="2" height="1.5" rx="0.7" fill="#F5A623"/>
  <!-- Tail light -->
  <rect x="5" y="17" width="2" height="1.5" rx="0.7" fill="#FF6B6B" opacity="0.9"/>
</svg>
